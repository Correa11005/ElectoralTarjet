<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dibujar | Canvas Draw</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="btn btn-ghost" href="index.html">← Volver</a>
      <h2 class="topbar-title">Dibuja sobre la imagen</h2>
      <div class="spacer"></div>
    </header>

    <section class="card">
      <div class="controls">
        <button id="modeBtn" class="btn btn-secondary" type="button" aria-pressed="true">
       ✍️ Dibujar
        </button>
        <label class="control">
          <span class="control-label">Color</span>
          <input id="colorPicker" type="color" value="#ff2d55" />
        </label>

        <label class="control">
          <span class="control-label">Grosor: <strong id="sizeValue">6</strong></span>
          <input id="sizeRange" type="range" min="1" max="40" value="6" />
        </label>

        <label class="control">
          <span class="control-label">Zoom: <strong id="zoomValue">1.0</strong>x</span>
          <input id="zoomRange" type="range" min="0.7" max="2.5" step="0.1" value="1" />
        </label>

        <button id="undoBtn" class="btn btn-secondary" type="button">Deshacer</button>
        <button id="clearBtn" class="btn btn-danger" type="button">Borrar todo</button>
        <button id="downloadBtn" class="btn btn-primary" type="button">Descargar imagen</button>
      </div>

      <!-- Wrapper con scroll -->
      <div class="stage-wrapper" aria-label="Área de dibujo">
        <!-- Contenedor escalable -->
        <div class="stage" id="stage">
          <img
            id="baseImage"
            alt="Tarjeta"
            src="assets/tarjeta.jpg"
            loading="eager"
            decoding="async"
          />
          <canvas id="drawCanvas"></canvas>
        </div>

        <div class="stage-hint muted">
          Usa el zoom para acercarte. Desliza para hacer scroll sin rayar.
        </div>
      </div>
    </section>

    <footer class="footer muted">
      El dibujo se guarda en historial (strokes) para mantener proporción al redimensionar.
    </footer>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
