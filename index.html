<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio | Canvas Draw</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="card hero">
      <h1>Dibujar sobre una imagen</h1>
      <p class="muted">
        Abre la herramienta, carga una imagen (o usa la de ejemplo) y dibuja con mouse o touch.
      </p>

      <a class="btn btn-primary" href="draw.html">Abrir imagen para dibujar</a>

      <div class="tips">
        <div class="tip">
          <span class="badge">Tip</span>
          <span>En móvil: dibuja con el dedo (touch).</span>
        </div>
        <div class="tip">
          <span class="badge">Tip</span>
          <span>Usa “Deshacer” para múltiples pasos.</span>
        </div>
      </div>
    </section>

    <footer class="footer muted">
      Hecho con HTML5 Canvas + JavaScript Vanilla.
    </footer>
  </main>

  <script src="script.js" defer></script>

</html>
